<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽題轉盤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a12;
  --bg-card: #13131f;
  --bg-card-hover: #1a1a2e;
  --accent: #f72585;
  --accent-glow: rgba(247, 37, 133, 0.4);
  --secondary: #4cc9f0;
  --secondary-glow: rgba(76, 201, 240, 0.3);
  --tertiary: #7209b7;
  --gold: #ffd60a;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --radius: 16px;
  --radius-sm: 10px;
}

html { font-size: 16px; }

body {
  font-family: 'Noto Sans TC', 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Ambient background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(114, 9, 183, 0.15), transparent),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(247, 37, 133, 0.1), transparent),
    radial-gradient(ellipse 40% 60% at 60% 10%, rgba(76, 201, 240, 0.08), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ── Noise texture ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  gap: 0;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  grid-column: 1 / -1;
  padding: 28px 40px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--tertiary));
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 22px;
  box-shadow: 0 4px 20px var(--accent-glow);
}

.logo h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 1.6rem;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 30%, var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex;
  gap: 10px;
}

.btn-icon {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 18px;
  transition: all 0.2s;
}

.btn-icon:hover {
  background: var(--bg-card-hover);
  color: var(--text);
  border-color: rgba(255,255,255,0.12);
}

/* ── Main area ── */
.main {
  padding: 10px 40px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
}

/* ── Spinner stage ── */
.stage {
  position: relative;
  width: 360px;
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stage-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.04);
  transition: border-color 0.4s;
}

.stage-ring::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  border: 2px dashed rgba(255,255,255,0.06);
  animation: slow-spin 30s linear infinite;
}

@keyframes slow-spin {
  to { transform: rotate(360deg); }
}

.spinning .stage-ring {
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--accent-glow), inset 0 0 40px var(--accent-glow);
}

.spinning .stage-ring::before {
  animation-duration: 1s;
  border-color: var(--accent);
}

/* Orbiting dots */
.orbit-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--secondary);
  opacity: 0.3;
}

.orbit-dot:nth-child(2) { top: 0; left: 50%; transform: translate(-50%, -50%); }
.orbit-dot:nth-child(3) { bottom: 0; left: 50%; transform: translate(-50%, 50%); }
.orbit-dot:nth-child(4) { left: 0; top: 50%; transform: translate(-50%, -50%); }
.orbit-dot:nth-child(5) { right: 0; top: 50%; transform: translate(50%, -50%); }

.spinning .orbit-dot { opacity: 1; background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

/* Center result display */
.result-display {
  position: relative;
  z-index: 2;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
}

.result-display::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.03), transparent 60%);
  pointer-events: none;
}

.spinning .result-display {
  border-color: var(--accent);
  box-shadow: 0 0 60px var(--accent-glow);
}

.result-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
}

.result-text {
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.5;
  max-height: 120px;
  overflow-y: auto;
  scrollbar-width: none;
}

.result-text::-webkit-scrollbar { display: none; }

.result-text.empty {
  color: var(--text-dim);
  font-size: 1rem;
  font-weight: 500;
}

.result-text.spinning-text {
  color: var(--secondary);
  font-size: 3rem;
  filter: blur(0px);
  animation: spin-symbol 0.4s ease-in-out infinite;
}

@keyframes spin-symbol {
  0% { transform: rotateX(0deg) scale(1); opacity: 1; }
  50% { transform: rotateX(90deg) scale(0.8); opacity: 0.4; }
  100% { transform: rotateX(360deg) scale(1); opacity: 1; }
}

/* Spinning blur effect that intensifies */
.result-display.blur-active .result-text.spinning-text {
  animation: spin-symbol-fast 0.15s linear infinite;
}

@keyframes spin-symbol-fast {
  0% { transform: rotateX(0deg); opacity: 0.8; }
  50% { transform: rotateX(180deg); opacity: 0.3; }
  100% { transform: rotateX(360deg); opacity: 0.8; }
}

/* Reveal animation when result appears */
.result-text.reveal {
  animation: reveal-pop 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes reveal-pop {
  0% { transform: scale(0.5) rotateX(90deg); opacity: 0; filter: blur(8px); }
  60% { transform: scale(1.1) rotateX(0deg); opacity: 1; filter: blur(0px); }
  100% { transform: scale(1) rotateX(0deg); opacity: 1; filter: blur(0px); }
}

.result-number {
  position: absolute;
  bottom: 50px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* ── Draw button ── */
.draw-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.draw-btn {
  position: relative;
  padding: 18px 56px;
  font-size: 1.15rem;
  font-weight: 800;
  font-family: 'Noto Sans TC', sans-serif;
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--tertiary));
  border: none;
  border-radius: 60px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 6px 30px var(--accent-glow);
  overflow: hidden;
}

.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 60px;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15));
  opacity: 0;
  transition: opacity 0.3s;
}

.draw-btn:hover:not(:disabled)::before { opacity: 1; }

.draw-btn:hover:not(:disabled) {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 10px 40px var(--accent-glow);
}

.draw-btn:active:not(:disabled) {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 2px 16px var(--accent-glow);
}

.draw-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  filter: grayscale(0.4);
}

.draw-btn.spinning-btn {
  pointer-events: none;
  animation: btn-pulse 0.6s ease-in-out infinite alternate;
}

@keyframes btn-pulse {
  to { box-shadow: 0 6px 50px var(--accent-glow); }
}

.remaining {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-weight: 500;
  letter-spacing: 1px;
}

.remaining span {
  color: var(--secondary);
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--bg-card);
  border-left: 1px solid rgba(255,255,255,0.04);
  padding: 0;
  display: flex;
  flex-direction: column;
  grid-row: 1 / -1;
  grid-column: 2;
  max-height: 100vh;
  position: sticky;
  top: 0;
}

.sidebar-header {
  padding: 28px 24px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h2::before {
  content: '';
  width: 3px;
  height: 16px;
  border-radius: 2px;
  background: var(--accent);
}

.badge {
  background: rgba(247, 37, 133, 0.15);
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Outfit', sans-serif;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}

.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

.history-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-dim);
  font-size: 0.85rem;
  gap: 8px;
}

.history-empty-icon {
  font-size: 2rem;
  opacity: 0.3;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  margin: 4px 0;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.03);
  animation: slide-in 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  transition: background 0.2s;
}

.history-item:hover {
  background: rgba(255,255,255,0.04);
}

.history-item:first-child {
  background: rgba(247, 37, 133, 0.06);
  border-color: rgba(247, 37, 133, 0.12);
}

@keyframes slide-in {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.history-num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  display: grid;
  place-items: center;
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-dim);
  flex-shrink: 0;
}

.history-item:first-child .history-num {
  background: var(--accent);
  color: #fff;
}

.history-topic {
  font-size: 0.85rem;
  font-weight: 500;
  line-height: 1.4;
  flex: 1;
  min-width: 0;
  word-break: break-word;
}

/* ── Settings sidebar (topics editor) ── */
.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.04);
  display: flex;
  gap: 8px;
}

.btn-secondary {
  flex: 1;
  padding: 10px 16px;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--text-dim);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: rgba(255,255,255,0.12);
}

.btn-danger {
  color: var(--accent);
  border-color: rgba(247, 37, 133, 0.15);
}

.btn-danger:hover {
  background: rgba(247, 37, 133, 0.1);
  color: var(--accent);
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 32px;
  width: 90%;
  max-width: 520px;
  transform: scale(0.92) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}

.modal h3 {
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 8px;
}

.modal p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}

.btn-modal {
  padding: 10px 24px;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-modal.primary {
  background: linear-gradient(135deg, var(--accent), var(--tertiary));
  color: #fff;
}

.btn-modal.primary:hover { opacity: 0.9; transform: translateY(-1px); }

.btn-modal.ghost {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.08);
}

.btn-modal.ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }

/* ── Restore prompt modal ── */
.restore-modal .modal {
  max-width: 420px;
  text-align: center;
}

.restore-modal .restore-icon {
  font-size: 2.5rem;
  margin-bottom: 16px;
}

.restore-modal .modal-actions {
  justify-content: center;
}

/* ── Confetti / celebration ── */
.celebration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: confetti-fall 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  opacity: 0;
}

@keyframes confetti-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(120vh) rotate(720deg) scale(0.3); }
}

/* ── All drawn state ── */
.all-drawn .result-display {
  border-color: var(--gold);
  box-shadow: 0 0 40px rgba(255, 214, 10, 0.15);
}

.all-drawn .result-text {
  color: var(--gold);
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }

  .sidebar {
    grid-column: 1;
    grid-row: 3;
    max-height: 50vh;
    position: relative;
    border-left: none;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .header { padding: 20px 20px 16px; }
  .main { padding: 10px 20px 30px; }
  .stage { width: 280px; height: 280px; }
  .result-display { width: 200px; height: 200px; padding: 20px; }
  .result-text { font-size: 1.05rem; }
  .draw-btn { padding: 15px 44px; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>抽題轉盤</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="resetAll()" title="重置全部">↺</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">
    <div class="stage" id="stage">
      <div class="stage-ring">
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
      </div>
      <div class="result-display">
        <div class="result-label">抽題結果</div>
        <div class="result-text empty" id="resultText">點擊下方按鈕開始抽題</div>
        <div class="result-number" id="resultNumber"></div>
      </div>
    </div>

    <div class="draw-section">
      <button class="draw-btn" id="drawBtn" onclick="draw()">開始抽題</button>
      <div class="remaining">剩餘題目：<span id="remainCount">0</span> / <span id="totalCount">0</span></div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>抽題紀錄</h2>
      <span class="badge" id="historyBadge">0 題</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">
        <div class="history-empty-icon">📋</div>
        <span>尚未抽取任何題目</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-secondary btn-danger" onclick="clearHistory()">✕ 清除紀錄</button>
    </div>
  </aside>
</div>

<!-- Restore Modal -->
<div class="modal-overlay restore-modal" id="restoreModal">
  <div class="modal">
    <div class="restore-icon">💾</div>
    <h3>發現上次的抽題紀錄</h3>
    <p>上次已抽取 <strong id="restoreCount">0</strong> 題，要繼續還是重新開始？</p>
    <div class="modal-actions">
      <button class="btn-modal ghost" onclick="restoreDecision(false)">重新開始</button>
      <button class="btn-modal primary" onclick="restoreDecision(true)">繼續抽題</button>
    </div>
  </div>
</div>

<!-- Celebration container -->
<div class="celebration" id="celebration"></div>

<script>
// ── Default topics ──
const DEFAULT_TOPICS = [
  '看電影',
  '吃火鍋',
  '逛夜市',
  '買新衣服',
  '加班',
  '露營',
  '補習',
  '滑手機',
  '吃早餐',
  '騎機車',
  '玩桌遊',
  '發限時動態',
  '慶生',
  '跟朋友出去玩',
  '出國',
  '領紅包',
  '去教會',
  '唱歌',
  '超過半夜1:00睡覺',
  '超過中午12:00起床',
  '拌咖哩飯',
  '點外送',
  '打球',
  '養寵物',
  '買手搖杯',
  '追劇',
  '健身',
  '拍照（攝影）',
  '做報告',
  '整理房間',
];

// ── State ──
let allTopics = [];
let remainingTopics = [];
let history = [];
let isSpinning = false;

// ── DOM ──
const resultText = document.getElementById('resultText');
const resultNumber = document.getElementById('resultNumber');
const drawBtn = document.getElementById('drawBtn');
const remainCount = document.getElementById('remainCount');
const totalCount = document.getElementById('totalCount');
const historyList = document.getElementById('historyList');
const historyBadge = document.getElementById('historyBadge');
const stage = document.getElementById('stage');
const app = document.getElementById('app');

// ── Init ──
function init() {
  allTopics = [...DEFAULT_TOPICS];

  const savedHistory = localStorage.getItem('spinner_history');
  const savedRemaining = localStorage.getItem('spinner_remaining');

  if (savedHistory && JSON.parse(savedHistory).length > 0) {
    const parsed = JSON.parse(savedHistory);
    document.getElementById('restoreCount').textContent = parsed.length;
    showModal('restoreModal');
  } else {
    freshStart();
  }
}

function restoreDecision(restore) {
  closeModal('restoreModal');
  if (restore) {
    history = JSON.parse(localStorage.getItem('spinner_history') || '[]');
    remainingTopics = JSON.parse(localStorage.getItem('spinner_remaining') || '[]');
    if (history.length > 0) {
      const last = history[0];
      resultText.textContent = last;
      resultText.classList.remove('empty');
      resultNumber.textContent = `#${history.length}`;
    }
  } else {
    freshStart();
  }
  updateUI();
}

function freshStart() {
  remainingTopics = [...allTopics];
  history = [];
  resultText.textContent = '點擊下方按鈕開始抽題';
  resultText.classList.add('empty');
  resultNumber.textContent = '';
  app.classList.remove('all-drawn');
  saveState();
}

// ── Draw ──
function draw() {
  if (isSpinning || remainingTopics.length === 0) return;

  isSpinning = true;
  stage.classList.add('spinning');
  drawBtn.classList.add('spinning-btn');
  drawBtn.textContent = '抽取中…';
  resultText.classList.remove('empty', 'reveal');
  resultNumber.textContent = '';

  const resultDisplay = document.querySelector('.result-display');

  // Show spinning "？" symbol — no topics revealed
  resultText.textContent = '？';
  resultText.classList.add('spinning-text');

  // Start fast, then slow down
  const spinDuration = 1800 + Math.random() * 800; // 1.8–2.6s
  const startTime = Date.now();

  // After a brief moment, add the fast blur class
  setTimeout(() => resultDisplay.classList.add('blur-active'), 100);

  // Gradually slow down by switching symbols
  const symbols = ['？', '❓', '？'];
  let symbolIdx = 0;
  const symbolInterval = setInterval(() => {
    symbolIdx = (symbolIdx + 1) % symbols.length;
    resultText.textContent = symbols[symbolIdx];
  }, 300);

  // Remove fast blur near the end to create "slowing down" feel
  setTimeout(() => {
    resultDisplay.classList.remove('blur-active');
  }, spinDuration - 600);

  // Finalize after spin duration
  setTimeout(() => {
    clearInterval(symbolInterval);
    finalizeDraw(resultDisplay);
  }, spinDuration);
}

function finalizeDraw(resultDisplay) {
  const idx = Math.floor(Math.random() * remainingTopics.length);
  const chosen = remainingTopics.splice(idx, 1)[0];

  history.unshift(chosen);

  // Reveal with pop animation
  resultText.classList.remove('spinning-text');
  if (resultDisplay) resultDisplay.classList.remove('blur-active');
  resultText.textContent = chosen;
  resultText.classList.add('reveal');
  resultNumber.textContent = `#${history.length}`;

  stage.classList.remove('spinning');
  drawBtn.classList.remove('spinning-btn');
  drawBtn.textContent = '開始抽題';
  isSpinning = false;

  spawnConfetti();
  updateUI();
  saveState();

  if (remainingTopics.length === 0) {
    app.classList.add('all-drawn');
    drawBtn.disabled = true;
    drawBtn.textContent = '已全部抽完';
  }
}

// ── Confetti ──
function spawnConfetti() {
  const container = document.getElementById('celebration');
  const colors = ['#f72585', '#4cc9f0', '#7209b7', '#ffd60a', '#4361ee', '#f77f00'];
  const rect = stage.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 24; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = cx + (Math.random() - 0.5) * 100 + 'px';
    piece.style.top = cy + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.3 + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    piece.style.transform = `translateX(${(Math.random() - 0.5) * 300}px)`;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

// ── UI Updates ──
function updateUI() {
  remainCount.textContent = remainingTopics.length;
  totalCount.textContent = allTopics.length;
  historyBadge.textContent = history.length + ' 題';

  if (history.length === 0) {
    historyList.innerHTML = `
      <div class="history-empty">
        <div class="history-empty-icon">📋</div>
        <span>尚未抽取任何題目</span>
      </div>`;
  } else {
    historyList.innerHTML = history.map((topic, i) => `
      <div class="history-item">
        <div class="history-num">${history.length - i}</div>
        <div class="history-topic">${escapeHtml(topic)}</div>
      </div>
    `).join('');
  }

  if (remainingTopics.length === 0 && allTopics.length > 0 && history.length > 0) {
    drawBtn.disabled = true;
    drawBtn.textContent = '已全部抽完';
    app.classList.add('all-drawn');
  } else {
    drawBtn.disabled = false;
    drawBtn.textContent = '開始抽題';
    app.classList.remove('all-drawn');
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Persistence ──
function saveState() {
  localStorage.setItem('spinner_history', JSON.stringify(history));
  localStorage.setItem('spinner_remaining', JSON.stringify(remainingTopics));
}

// ── Actions ──
function clearHistory() {
  if (history.length === 0) return;
  if (!confirm('確定要清除抽題紀錄並重新開始嗎？')) return;
  freshStart();
  updateUI();
}

function resetAll() {
  if (!confirm('確定要重置並清除所有抽題紀錄嗎？')) return;
  freshStart();
  updateUI();
}

// ── Modal helpers ──
function showModal(id) {
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// Close modal on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  }
  if (e.code === 'Space' && !document.querySelector('.modal-overlay.active')) {
    e.preventDefault();
    draw();
  }
});

// ── Boot ──
init();
</script>
</body>
</html>
